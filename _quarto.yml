project:
  type: website
  output-dir: _site
  resources:
    - CNAME
    - .nojekyll
  render:
    - "*.qmd"
    - "articles/**/*.qmd"
    - "!article-sources/**"

website:
  title: "Minkyu's Tech Blog"
  site-url: https://smkgenesis.com
  navbar:
    left:
      - href: articles.qmd
        text: Articles
      - href: projects.qmd
        text: Projects

format:
  html:
    theme: cosmo
    css:
      - styles/styles.css
    toc: false
    include-in-header:
      - text: |
          <meta name="theme-color" content="#12151e">
          <link rel="icon" type="image/svg+xml" href="favicon.svg">
          <script src="page-transition.js" defer></script>